name: Audit

# Security audit workflow.
#
# Triggers:
#   - schedule: weekly proactive scan to catch newly published advisories
#       even when no code change happened.
#   - workflow_dispatch: on-demand manual run (Actions tab > Run workflow).
#   - push: scoped to dependency manifests so we re-audit any time the
#       dependency graph or license/ban policy actually changes.
#   - pull_request: every PR targeting `main` is audited so that branch
#       protection's "required status checks" are reliably reported on the
#       PR. We deliberately do NOT use a `paths` filter here so that a PR
#       which does not touch dependencies (e.g. a security hardening PR
#       that only edits source files) still satisfies the required check.
#       `paths-ignore` excludes pure documentation PRs to spare CI minutes.
on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      - '.editorconfig'

jobs:
  cargo-audit:
    name: cargo audit (vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit

  cargo-deny:
    name: cargo deny (license + bans + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo deny
        run: cargo deny check
