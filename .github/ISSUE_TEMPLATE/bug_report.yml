name: Bug report
description: Report a defect, unexpected behavior, or regression.
title: "[bug] "
labels: ["type:bug", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please fill in as much of the form as you can.
        For security-sensitive issues, please use the private advisory channel instead (see SECURITY.md).

  - type: checkboxes
    id: pre-checks
    attributes:
      label: Pre-flight
      description: Quick checks before submitting.
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I am using the latest commit on `main`, or I have noted my version below.
          required: true
        - label: This is not a security-sensitive issue (otherwise I will use the private advisory channel).
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear and concise description of what is happening.
      placeholder: When I X, the application Y instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps so the maintainer can reproduce the issue locally.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other (specify in description)
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "e.g. Windows 11 23H2, macOS 14.4, Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust version
      placeholder: "Output of `rustc --version`"
    validations:
      required: true

  - type: input
    id: forge-version
    attributes:
      label: Forgexalith version / commit
      placeholder: "Tag (e.g. v0.1.0-alpha) or commit hash"

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace / screenshots
      description: Attach console output, panic messages, or screenshots if relevant. Redact any personal data.
      render: text

  - type: dropdown
    id: severity
    attributes:
      label: Severity (your perception)
      options:
        - low (cosmetic, minor inconvenience)
        - medium (affects a workflow but workaround exists)
        - high (blocks a major workflow)
        - critical (data loss, app cannot start)
    validations:
      required: true
