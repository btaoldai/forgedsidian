# Labels managed via github-label-sync (npm install -g github-label-sync)
# Apply : github-label-sync --access-token $GH_TOKEN btaoldai/forgexalith
# (or via GitHub Actions in a future workflow)

# === Type ===
- name: "type:bug"
  color: "d73a4a"
  description: "Something is broken"
- name: "type:feature"
  color: "a2eeef"
  description: "New feature or capability"
- name: "type:docs"
  color: "0075ca"
  description: "Documentation only"
- name: "type:refactor"
  color: "cfd3d7"
  description: "Behavior-preserving change"
- name: "type:perf"
  color: "f4d9b1"
  description: "Performance improvement"
- name: "type:security"
  color: "5319e7"
  description: "Security-related"
- name: "type:question"
  color: "d876e3"
  description: "Question -- prefer Discussions"
- name: "type:deps"
  color: "0366d6"
  description: "Dependency updates"
- name: "type:ci"
  color: "fbca04"
  description: "CI / build configuration"

# === Component (per crate) ===
- name: "crate:forge-core"
  color: "c5def5"
  description: "Crate forge-core"
- name: "crate:forge-vault"
  color: "c5def5"
  description: "Crate forge-vault"
- name: "crate:forge-editor"
  color: "c5def5"
  description: "Crate forge-editor"
- name: "crate:forge-graph"
  color: "c5def5"
  description: "Crate forge-graph"
- name: "crate:forge-canvas"
  color: "c5def5"
  description: "Crate forge-canvas"
- name: "crate:forge-renderer"
  color: "c5def5"
  description: "Crate forge-renderer"
- name: "crate:forge-ui"
  color: "c5def5"
  description: "Crate forge-ui (Leptos frontend)"
- name: "crate:src-tauri"
  color: "c5def5"
  description: "Tauri backend"

# === Priority ===
- name: "prio:critical"
  color: "b60205"
  description: "Drop everything"
- name: "prio:high"
  color: "d93f0b"
  description: "Important"
- name: "prio:medium"
  color: "fbca04"
  description: "Standard"
- name: "prio:low"
  color: "0e8a16"
  description: "Nice to have"

# === Status ===
- name: "status:needs-triage"
  color: "ededed"
  description: "Awaiting maintainer review"
- name: "status:confirmed"
  color: "0e8a16"
  description: "Reproduced or accepted"
- name: "status:in-progress"
  color: "1d76db"
  description: "Someone is working on it"
- name: "status:blocked"
  color: "e99695"
  description: "Cannot proceed"
- name: "status:wontfix"
  color: "ffffff"
  description: "Will not be addressed"

# === Difficulty ===
- name: "good first issue"
  color: "7057ff"
  description: "Approachable for newcomers"
- name: "help wanted"
  color: "008672"
  description: "Maintainers welcome external help"
- name: "complex"
  color: "5319e7"
  description: "Requires deep familiarity"

# === Platform ===
- name: "platform:windows"
  color: "00bfff"
  description: "Windows-specific"
- name: "platform:macos"
  color: "c0c0c0"
  description: "macOS-specific"
- name: "platform:linux"
  color: "fbca04"
  description: "Linux-specific"

# === Meta ===
- name: "duplicate"
  color: "cfd3d7"
  description: "Already reported"
- name: "invalid"
  color: "e4e669"
  description: "Not actionable as filed"
